version: 1
default: ask

include:
  - defaults:recommended # use built-in preset

rules:
  # allow go commands (and harmless helpers like `cd` when chained with go)
  - name: go
    action: allow
    when: |
      kind == "exec" &&
      cmds.exists(c, c.name == "go") &&
      cmds.all(c,
        (c.name == "go" &&
         c.args.size() > 0 &&
         c.args[0] in ["build", "doc", "fix", "fmt", "generate", "list", "test", "version", "vet"])
        || c.name in ["cd", "pwd", "echo", "true"]
      )
