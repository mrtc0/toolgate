# Dynamic shell code execution that requires confirmation
version: 1

rules:
  # Inline shell code via -c, or the `eval` builtin → ask
  #
  # `bash -c "..."` / `sh -c "..."` run code from the command line rather than
  # a file, and `eval` executes its arguments as a command. Running a script
  # file (`bash script.sh`) is left to the default.
  - name: ask-shell-inline-exec
    action: ask
    when: |
      kind == "exec" &&
      cmds.exists(c,
        c.name == "eval" ||
        (c.name in ["sh", "bash", "zsh", "dash", "ksh", "ash", "fish"] &&
         c.flags.exists(f, f == "c")))
    message: "Inline shell code execution (sh -c / eval). Confirm."

  # Piping downloaded content straight into a shell → ask
  #
  # The classic `curl <url> | sh` install pattern (and its wget variants)
  # executes remote code that is never inspected. Gated when a shell reads from
  # a pipe whose upstream is a network fetcher; purely local pipes
  # (e.g. `cat script.sh | sh`) are left to the default.
  - name: ask-fetch-into-shell
    action: ask
    when: |
      kind == "exec" &&
      cmds.exists(c,
        c.name in ["sh", "bash", "zsh", "dash", "ksh", "ash", "fish"] &&
        c.pipe_from.exists(u,
          u in ["curl", "wget", "fetch", "http", "https", "aria2c"]))
    message: "Piping downloaded content into a shell (e.g. curl | sh). Confirm."
