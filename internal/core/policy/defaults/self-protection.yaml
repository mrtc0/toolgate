# Self-protection: deny writes to toolgate's policy and agent hooks
version: 1

rules:
  - name: protect-gate-config
    action: deny
    when: |
      writes.exists(p,
        p.glob("{.toolgate.yaml,.claude.json,.config/toolgate/**}") ||
        p.glob(".claude/{settings.json,settings.local.json,hooks/**}") ||
        p.glob(".cursor/hooks.json") ||
        p.glob("{.copilot,.github}/hooks/**") ||
        p == "/etc/claude-code/managed-settings.json")
    message: "Writing to toolgate policy or agent hook config is blocked."
